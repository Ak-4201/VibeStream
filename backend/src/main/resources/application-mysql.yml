# Aiven MySQL for VibeStream. Use: spring.profiles.active=mysql and set SPRING_DATASOURCE_PASSWORD.
spring:
  datasource:
    url: jdbc:mysql://streamweb-vibestream.d.aivencloud.com:12071/defaultdb?sslMode=REQUIRED
    username: avnadmin
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
